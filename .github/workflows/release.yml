name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0, v1.1.0 等标签时触发

permissions:
  contents: write  # 允许创建 Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      # 3. 设置 Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      # 4. 构建项目（使用系统 gradle）
      - name: Build with Gradle
        run: gradle release --no-daemon
      
      # 5. 创建 GitHub Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Anemone Java ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Anemone Bot (Java 版) ${{ github.ref_name }}
            
            ### 快速开始
            1. 下载 `Anemone-java-${{ github.ref_name }}.zip`
            2. 解压并复制 `config/application.yaml.example` 为 `config/application.yaml`
            3. 编辑配置填入您的 DeepSeek API Key 和 Bot QQ 号
            4. 运行 `start.bat` (Windows) 或 `start.sh` (Linux/Mac)
            
            ### 功能列表
            - ✅ 数学定义查询 (`/define`)
            - ✅ 数学谜题 20 Questions (`/mathpuzzle`)
            - ✅ 午时游戏 俄罗斯轮盘 (`/highnoon`)
            - ✅ PJSK 谱面查询 (`/chart`)
            - ✅ MCMOD 查询 (`/mcmod`)
            - ✅ 随机回复 (AI 自动回复)
            - ✅ 状态控制 (`/admin`)
            
            详细文档请查看 [README.md](../blob/main/README.md)
      
      # 6. 上传构建包到 Release
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/distributions/Anemone-java-${{ github.ref_name }}.zip
          asset_name: Anemone-java-${{ github.ref_name }}.zip
          asset_content_type: application/zip
