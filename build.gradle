plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.8'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.anemone'
version = '2.4.0'
description = 'Anemone Bot - QQ群聊机器人 (Java版)'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    
    // 保留参数名（Spring 6.x 需要）
    compileJava {
        options.compilerArgs.add('-parameters')
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    
    // Jakarta 注解（Java 9+ 替代 javax.annotation）
    implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'
    
    // Shiro - 基于 OneBot 协议的 QQ 机器人框架 (使用稳定版)
    implementation 'com.mikuac:shiro:2.3.9'
    
    // JSON 处理
    implementation 'com.alibaba.fastjson2:fastjson2:2.0.53'
    
    // HTTP 客户端
    implementation 'cn.hutool:hutool-http:5.8.26'
    implementation 'cn.hutool:hutool-json:5.8.26'
    
    // 工具库
    implementation 'org.apache.commons:commons-lang3:3.14.0'
    
    // 配置处理
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    
    // 测试
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
